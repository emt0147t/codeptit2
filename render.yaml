services:
  - type: web
    name: codeptitclone
    env: docker
    plan: free
    dockerContext: .
    dockerfilePath: ./Dockerfile
    dockerCommand: "uvicorn main:app --host 0.0.0.0 --port 10000"
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
