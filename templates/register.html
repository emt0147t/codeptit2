{% extends "base.html" %}
{% block title %}Đăng ký - CodePTITclone{% endblock %}

{% block content %}
<div class="flex items-center justify-center min-h-[70vh]">
    <div class="w-full max-w-md animate-fade-in">
        <div class="text-center mb-6">
            <h2 class="text-2xl font-extrabold text-gray-800">Tạo tài khoản mới</h2>
            <p class="text-sm text-gray-500 mt-1">Bắt đầu hành trình luyện tập ngay</p>
        </div>

        <div class="bg-white p-8 rounded-2xl shadow-lg border border-gray-100">
            {% if error %}
            <div
                class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-xl mb-5 text-sm flex items-center gap-2">
                <svg class="w-4 h-4 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20">
                    <path fill-rule="evenodd"
                        d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"
                        clip-rule="evenodd" />
                </svg>
                {{ error }}
            </div>
            {% endif %}

            <form method="POST" action="/register">
                <div class="mb-4">
                    <label class="block text-gray-700 text-xs font-semibold mb-1.5 uppercase tracking-wider">Tên đăng
                        nhập</label>
                    <input type="text" name="username" required
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 outline-none transition text-sm"
                        placeholder="Nhập tên đăng nhập">
                </div>
                <div class="mb-4">
                    <label
                        class="block text-gray-700 text-xs font-semibold mb-1.5 uppercase tracking-wider">Email</label>
                    <input type="email" name="email" required
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 outline-none transition text-sm"
                        placeholder="Nhập email">
                </div>
                <div class="mb-4">
                    <label class="block text-gray-700 text-xs font-semibold mb-1.5 uppercase tracking-wider">Mật
                        khẩu</label>
                    <input type="password" name="password" required
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 outline-none transition text-sm"
                        placeholder="Nhập mật khẩu">
                </div>
                <div class="mb-6">
                    <label class="block text-gray-700 text-xs font-semibold mb-1.5 uppercase tracking-wider">Xác nhận
                        mật khẩu</label>
                    <input type="password" name="password_confirm" required
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-brand-500/30 focus:border-brand-500 outline-none transition text-sm"
                        placeholder="Nhập lại mật khẩu">
                </div>
                <button type="submit"
                    class="w-full bg-brand-600 hover:bg-brand-700 text-white font-semibold py-2.5 rounded-xl transition shadow-md hover:shadow-lg text-sm">
                    Đăng ký
                </button>
            </form>

            <p class="mt-5 text-center text-gray-500 text-sm">
                Đã có tài khoản? <a href="/login" class="text-brand-600 hover:text-brand-700 font-semibold">Đăng
                    nhập</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}
